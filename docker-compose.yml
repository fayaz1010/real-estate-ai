version: '3.8'

services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NGINX_HOST=${NGINX_HOST:-localhost}
      - SECURITY_HSTS_ENABLED=${SECURITY_HSTS_ENABLED:-true}
    volumes:
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - app
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "4041"
    environment:
      - NODE_ENV=production
      - PORT=4041
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/realestate
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - VITE_VAPID_PUBLIC_KEY=${VITE_VAPID_PUBLIC_KEY}
      - VITE_STRIPE_PUBLISHABLE_KEY=${VITE_STRIPE_PUBLISHABLE_KEY}
      - VITE_STRIPE_PRICE_STARTER=${VITE_STRIPE_PRICE_STARTER}
      - VITE_STRIPE_PRICE_PROFESSIONAL=${VITE_STRIPE_PRICE_PROFESSIONAL}
      - VITE_STRIPE_PRICE_BUSINESS=${VITE_STRIPE_PRICE_BUSINESS}
      - VITE_STRIPE_PRICE_ENTERPRISE=${VITE_STRIPE_PRICE_ENTERPRISE}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - SECURITY_HSTS_ENABLED=${SECURITY_HSTS_ENABLED:-true}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=realestate
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  db_backup:
    image: alpine:3.19
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_NAME=${DB_BACKUP_DB_NAME:-realestate}
      - DB_USER=${DB_BACKUP_DB_USER:-postgres}
      - DB_PASSWORD=${DB_BACKUP_DB_PASSWORD:-postgres}
      - BACKUP_PATH=${DB_BACKUP_PATH:-/backups}
      - DB_HOST=db
    volumes:
      - ./scripts/backup_db.sh:/scripts/backup_db.sh:ro
      - ./db_backups:/backups
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache bash postgresql-client
        chmod +x /scripts/backup_db.sh
        echo "0 3 * * * DB_HOST=db /scripts/backup_db.sh $$DB_NAME $$DB_USER $$DB_PASSWORD $$BACKUP_PATH >> /var/log/cron.log 2>&1" > /etc/crontabs/root
        crond -f -l 2
    restart: unless-stopped

volumes:
  postgres_data:
  certbot_conf:
  certbot_www:
