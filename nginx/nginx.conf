# RealEstate AI - Nginx Production Configuration with SSL/HTTPS
# This configuration is designed for use with Let's Encrypt certificates.
# The HSTS header is toggled via the SECURITY_HSTS_ENABLED environment variable
# through the docker-entrypoint.sh script.

# --- HTTP → HTTPS Redirect ---
server {
    listen 80;
    listen [::]:80;
    server_name ${NGINX_HOST};

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS Server ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ${NGINX_HOST};

    # --- SSL Certificate Paths ---
    # When using Let's Encrypt with Certbot:
    ssl_certificate     /etc/letsencrypt/live/${NGINX_HOST}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${NGINX_HOST}/privkey.pem;

    # For manual certificate setup, use these paths instead:
    # ssl_certificate     /etc/nginx/ssl/certificate.crt;
    # ssl_certificate_key /etc/nginx/ssl/private.key;

    # --- SSL Protocols (TLSv1.2 and TLSv1.3 only) ---
    ssl_protocols TLSv1.2 TLSv1.3;

    # --- Strong Cipher Suites ---
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # --- SSL Session Settings ---
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # --- Diffie-Hellman Parameters ---
    # Generate with: openssl dhparam -out /etc/nginx/ssl/dhparam.pem 2048
    # ssl_dhparam /etc/nginx/ssl/dhparam.pem;

    # --- OCSP Stapling ---
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/${NGINX_HOST}/chain.pem;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # --- Security Headers ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # HSTS header is injected by docker-entrypoint.sh based on SECURITY_HSTS_ENABLED
    # When enabled, the following header is added:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    include /etc/nginx/conf.d/hsts.conf;

    # --- Proxy Settings ---
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # --- Proxy Timeouts ---
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # --- Request Size Limit ---
    client_max_body_size 10m;

    # --- API Proxy ---
    location /api/ {
        proxy_pass http://app:4041;
    }

    # --- Health Check Proxy ---
    location /health {
        proxy_pass http://app:4041;
    }

    # --- API Docs Proxy ---
    location /api-docs {
        proxy_pass http://app:4041;
    }

    # --- Static Assets (served by Express in production) ---
    location / {
        proxy_pass http://app:4041;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://app:4041;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
