<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Background -->
  <rect width="800" height="600" fill="#fff"/>

  <!-- Subtle background accent shapes -->
  <circle cx="650" cy="150" r="180" fill="#e0f2f1" opacity=".5"/>
  <circle cx="150" cy="450" r="120" fill="#e0f2f1" opacity=".35"/>

  <!-- Subtle grid / circuit pattern -->
  <g stroke="#008080" stroke-opacity=".06" stroke-width=".75">
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
  </g>

  <!-- Neural network / AI nodes (top-right) -->
  <g>
    <line x1="580" y1="100" x2="650" y2="160" stroke="#008080" stroke-opacity=".12" stroke-width="1.5"/>
    <line x1="650" y1="160" x2="730" y2="130" stroke="#008080" stroke-opacity=".1" stroke-width="1.5"/>
    <line x1="650" y1="160" x2="700" y2="240" stroke="#008080" stroke-opacity=".1" stroke-width="1.5"/>
    <line x1="580" y1="100" x2="510" y2="170" stroke="#008080" stroke-opacity=".1" stroke-width="1.5"/>
    <line x1="510" y1="170" x2="570" y2="250" stroke="#008080" stroke-opacity=".1" stroke-width="1.5"/>
    <line x1="570" y1="250" x2="700" y2="240" stroke="#008080" stroke-opacity=".1" stroke-width="1.5"/>
    <line x1="730" y1="130" x2="760" y2="210" stroke="#008080" stroke-opacity=".08" stroke-width="1"/>
    <line x1="760" y1="210" x2="700" y2="240" stroke="#008080" stroke-opacity=".08" stroke-width="1"/>
    <circle cx="580" cy="100" r="5" fill="#008080" opacity=".2"/>
    <circle cx="650" cy="160" r="6" fill="#008080" opacity=".25"/>
    <circle cx="730" cy="130" r="4" fill="#008080" opacity=".18"/>
    <circle cx="510" cy="170" r="4.5" fill="#008080" opacity=".18"/>
    <circle cx="570" cy="250" r="5" fill="#008080" opacity=".2"/>
    <circle cx="700" cy="240" r="5.5" fill="#008080" opacity=".22"/>
    <circle cx="760" cy="210" r="3.5" fill="#008080" opacity=".15"/>
  </g>

  <!-- AI nodes (top-left, subtle) -->
  <g>
    <line x1="80" y1="70" x2="150" y2="120" stroke="#008080" stroke-opacity=".07" stroke-width="1"/>
    <line x1="150" y1="120" x2="120" y2="190" stroke="#008080" stroke-opacity=".07" stroke-width="1"/>
    <line x1="80" y1="70" x2="40" y2="140" stroke="#008080" stroke-opacity=".07" stroke-width="1"/>
    <circle cx="80" cy="70" r="3" fill="#008080" opacity=".12"/>
    <circle cx="150" cy="120" r="3.5" fill="#008080" opacity=".15"/>
    <circle cx="120" cy="190" r="2.5" fill="#008080" opacity=".1"/>
    <circle cx="40" cy="140" r="2.5" fill="#008080" opacity=".1"/>
  </g>

  <!-- Modern building cluster (center-right) -->
  <g transform="translate(400, 120)">
    <!-- Tall tower -->
    <rect x="0" y="0" width="60" height="210" rx="3" fill="#008080"/>
    <g fill="#e0f2f1" opacity=".55">
      <rect x="10" y="15" width="15" height="10" rx="1.5"/>
      <rect x="35" y="15" width="15" height="10" rx="1.5"/>
      <rect x="10" y="35" width="15" height="10" rx="1.5"/>
      <rect x="35" y="35" width="15" height="10" rx="1.5"/>
      <rect x="10" y="55" width="15" height="10" rx="1.5"/>
      <rect x="35" y="55" width="15" height="10" rx="1.5"/>
      <rect x="10" y="75" width="15" height="10" rx="1.5"/>
      <rect x="35" y="75" width="15" height="10" rx="1.5"/>
      <rect x="10" y="95" width="15" height="10" rx="1.5"/>
      <rect x="35" y="95" width="15" height="10" rx="1.5"/>
      <rect x="10" y="115" width="15" height="10" rx="1.5"/>
      <rect x="35" y="115" width="15" height="10" rx="1.5"/>
      <rect x="10" y="135" width="15" height="10" rx="1.5"/>
      <rect x="35" y="135" width="15" height="10" rx="1.5"/>
      <rect x="10" y="155" width="15" height="10" rx="1.5"/>
      <rect x="35" y="155" width="15" height="10" rx="1.5"/>
      <rect x="10" y="175" width="15" height="10" rx="1.5"/>
      <rect x="35" y="175" width="15" height="10" rx="1.5"/>
    </g>

    <!-- Medium building -->
    <rect x="70" y="55" width="50" height="155" rx="3" fill="#008080" opacity=".8"/>
    <g fill="#e0f2f1" opacity=".45">
      <rect x="80" y="70" width="12" height="8" rx="1"/>
      <rect x="98" y="70" width="12" height="8" rx="1"/>
      <rect x="80" y="88" width="12" height="8" rx="1"/>
      <rect x="98" y="88" width="12" height="8" rx="1"/>
      <rect x="80" y="106" width="12" height="8" rx="1"/>
      <rect x="98" y="106" width="12" height="8" rx="1"/>
      <rect x="80" y="124" width="12" height="8" rx="1"/>
      <rect x="98" y="124" width="12" height="8" rx="1"/>
      <rect x="80" y="142" width="12" height="8" rx="1"/>
      <rect x="98" y="142" width="12" height="8" rx="1"/>
      <rect x="80" y="160" width="12" height="8" rx="1"/>
      <rect x="98" y="160" width="12" height="8" rx="1"/>
      <rect x="80" y="178" width="12" height="8" rx="1"/>
      <rect x="98" y="178" width="12" height="8" rx="1"/>
    </g>

    <!-- Short building -->
    <rect x="130" y="110" width="45" height="100" rx="3" fill="#006666" opacity=".75"/>
    <g fill="#e0f2f1" opacity=".4">
      <rect x="138" y="122" width="10" height="7" rx="1"/>
      <rect x="157" y="122" width="10" height="7" rx="1"/>
      <rect x="138" y="139" width="10" height="7" rx="1"/>
      <rect x="157" y="139" width="10" height="7" rx="1"/>
      <rect x="138" y="156" width="10" height="7" rx="1"/>
      <rect x="157" y="156" width="10" height="7" rx="1"/>
      <rect x="138" y="173" width="10" height="7" rx="1"/>
      <rect x="157" y="173" width="10" height="7" rx="1"/>
    </g>

    <!-- House silhouette (left of cluster) -->
    <g transform="translate(-95, 145)">
      <polygon points="35,0 70,28 0,28" fill="#008080" opacity=".65"/>
      <rect x="5" y="28" width="60" height="35" rx="1" fill="#006666" opacity=".65"/>
      <rect x="22" y="36" width="16" height="27" rx="1.5" fill="#e0f2f1" opacity=".45"/>
      <rect x="46" y="38" width="12" height="10" rx="1" fill="#e0f2f1" opacity=".35"/>
    </g>
  </g>

  <!-- Ground line -->
  <line x1="60" y1="330" x2="600" y2="330" stroke="#006666" stroke-opacity=".15" stroke-width="1"/>

  <!-- Circuit traces connecting buildings to analytics -->
  <g stroke="#008080" stroke-opacity=".1" stroke-width="1.5" fill="none" stroke-dasharray="5,4">
    <path d="M400,330 L330,380 L180,380"/>
    <path d="M460,330 L460,370 L380,420"/>
    <path d="M530,330 L550,380 L550,430"/>
  </g>
  <circle cx="330" cy="380" r="3" fill="#008080" opacity=".15"/>
  <circle cx="460" cy="370" r="3" fill="#008080" opacity=".15"/>
  <circle cx="550" cy="380" r="3" fill="#008080" opacity=".15"/>

  <!-- Stylized data analytics graph -->
  <g transform="translate(70, 350)">
    <!-- Chart area fill (flat color, no gradient) -->
    <path d="M0,200 L0,160 L80,140 L160,120 L240,80 L320,60 L400,18 L480,2 L480,200 Z" fill="#008080" opacity=".08"/>
    <!-- Chart line -->
    <polyline points="0,160 80,140 160,120 240,80 320,60 400,18 480,2" stroke="#008080" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Data points -->
    <circle cx="0" cy="160" r="4" fill="#008080"/>
    <circle cx="80" cy="140" r="4" fill="#008080"/>
    <circle cx="160" cy="120" r="4" fill="#008080"/>
    <circle cx="240" cy="80" r="4.5" fill="#008080"/>
    <circle cx="320" cy="60" r="4.5" fill="#008080"/>
    <circle cx="400" cy="18" r="5" fill="#008080"/>
    <circle cx="480" cy="2" r="5.5" fill="#006666"/>
    <!-- Baseline -->
    <line x1="0" y1="200" x2="480" y2="200" stroke="#006666" stroke-opacity=".18" stroke-width="1"/>
    <!-- Y-axis -->
    <line x1="0" y1="0" x2="0" y2="200" stroke="#006666" stroke-opacity=".12" stroke-width="1"/>
    <!-- Y-axis ticks -->
    <line x1="-5" y1="200" x2="0" y2="200" stroke="#006666" stroke-opacity=".25" stroke-width="1"/>
    <line x1="-5" y1="150" x2="0" y2="150" stroke="#006666" stroke-opacity=".25" stroke-width="1"/>
    <line x1="-5" y1="100" x2="0" y2="100" stroke="#006666" stroke-opacity=".25" stroke-width="1"/>
    <line x1="-5" y1="50" x2="0" y2="50" stroke="#006666" stroke-opacity=".25" stroke-width="1"/>
    <!-- Horizontal grid lines -->
    <line x1="0" y1="150" x2="480" y2="150" stroke="#006666" stroke-opacity=".06" stroke-width=".75" stroke-dasharray="3,3"/>
    <line x1="0" y1="100" x2="480" y2="100" stroke="#006666" stroke-opacity=".06" stroke-width=".75" stroke-dasharray="3,3"/>
    <line x1="0" y1="50" x2="480" y2="50" stroke="#006666" stroke-opacity=".06" stroke-width=".75" stroke-dasharray="3,3"/>
  </g>

  <!-- Upward trend arrow at chart peak -->
  <g transform="translate(546, 328)">
    <line x1="0" y1="12" x2="0" y2="-8" stroke="#006666" stroke-width="2" stroke-linecap="round"/>
    <polyline points="-5,-2 0,-8 5,-2" stroke="#006666" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Decorative geometric accents -->
  <g opacity=".1">
    <rect x="680" y="410" width="28" height="28" rx="5" stroke="#008080" stroke-width="1.5" fill="none" transform="rotate(15,694,424)"/>
    <rect x="715" y="455" width="18" height="18" rx="3" stroke="#006666" stroke-width="1" fill="none" transform="rotate(-10,724,464)"/>
    <circle cx="660" cy="465" r="9" stroke="#008080" stroke-width="1" fill="none"/>
  </g>
  <g opacity=".08">
    <rect x="50" y="460" width="22" height="22" rx="4" stroke="#008080" stroke-width="1.5" fill="none" transform="rotate(20,61,471)"/>
    <circle cx="105" cy="490" r="7" stroke="#006666" stroke-width="1" fill="none"/>
  </g>
</svg>